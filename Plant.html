<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>機場接送預約</title>
    <script src="https://static.line-scdn.net"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f8f9fa; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        select, input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; background-color: #00b900; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        #transferNote { display: none; color: #d9534f; font-size: 14px; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h3>🚖 機場接送預約單</h3>
    <form id="bookingForm">
        <div class="form-group">
            <label>類別</label>
            <select id="type" onchange="toggleNote()">
                <option value="接機">接機</option>
                <option value="送機">送機</option>
            </select>
        </div>
        <div id="transferNote">☆☆☆送機時間請填寫司機到上車點的時間</div>
        
        <div class="form-group">
            <label>日期與時間</label>
            <input type="datetime-local" id="datetime" required>
        </div>
        <div class="form-group">
            <label>航班資訊</label>
            <input type="text" id="flight" placeholder="如：BR191" required>
        </div>
        <div class="form-group">
            <label>人數</label>
            <select id="passengers" onchange="checkVehicle()">
                <script>for(let i=1;i<=8;i++) document.write(`<option value="${i}">${i}人</option>`);</script>
            </select>
        </div>
        <div class="form-group">
            <label>車種</label>
            <select id="vehicle">
                <option value="轎車">轎車 (限4人)</option>
                <option value="休旅車">休旅車 (限4人)</option>
                <option value="7人座以上">7人座以上</option>
            </select>
        </div>
        <div class="form-group">
            <label>行李數量/大小</label>
            <input type="text" id="luggage" placeholder="例如：28吋*2 (無則填無)">
        </div>
        <button type="button" id="submitBtn" onclick="sendOrder()" disabled>載入中...</button>
    </form>

    <script>
        const LIFF_ID = "2009263508-hAj1Qpgw";

        liff.init({ liffId: LIFF_ID }).then(() => {
            const btn = document.getElementById('submitBtn');
            btn.disabled = false;
            btn.innerText = "確認送出預約";
            
            if (!liff.isLoggedIn()) {
                liff.login();
            }
        }).catch((err) => {
            alert("LIFF 初始化失敗，請檢查網路或 ID");
        });

        function toggleNote() {
            const type = document.getElementById('type').value;
            document.getElementById('transferNote').style.display = (type === "送機") ? "block" : "none";
        }

        function checkVehicle() {
            const pCount = parseInt(document.getElementById('passengers').value);
            const vehicleSelect = document.getElementById('vehicle');
            if (pCount >= 5) {
                vehicleSelect.value = "7人座以上";
                vehicleSelect.options[0].disabled = true; // 轎車
                vehicleSelect.options[1].disabled = true; // 休旅車
            } else {
                vehicleSelect.options[0].disabled = false;
                vehicleSelect.options[1].disabled = false;
            }
        }

        async function sendOrder() {
            const rawDt = document.getElementById('datetime').value;
            if(!rawDt) return alert("請填寫預約日期與時間！");

            const msgText = `【機場接送預約】\n服務：${document.getElementById('type').value}\n時間：${rawDt.replace('T', ' ')}\n航班：${document.getElementById('flight').value}\n人數：${document.getElementById('passengers').value}人\n車種：${document.getElementById('vehicle').value}\n行李：${document.getElementById('luggage').value}`;

            try {
                // 核心關鍵：檢查權限並發送
                if (liff.isInClient()) {
                    await liff.sendMessages();
                    liff.closeWindow();
                } else {
                    alert("請在 LINE App 內使用此表單！\n\n您的訊息：\n" + msgText);
                }
            } catch (err) {
                alert("發送失敗！可能原因：\n1. 權限沒開 (chat_message.write)\n2. 沒按接受授權\n\n錯誤代碼：" + err.message);
            }
        }
    </script>
</body>
</html>
