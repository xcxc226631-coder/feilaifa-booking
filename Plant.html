<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>機場接送預約</title>
    <!-- 確保 SDK 網址完全正確 -->
    <script src="https://static.line-scdn.net"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f8f9fa; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        select, input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background-color: #00b900; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
        /* 按鈕還沒準備好時的樣式 */
        button:disabled { background-color: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>
    <h3>🚖 機場接送預約單</h3>
    <form id="bookingForm">
        <div class="form-group">
            <label>類別</label>
            <select id="type" onchange="toggleNote()">
                <option value="接機">接機</option>
                <option value="送機">送機</option>
            </select>
        </div>
        <div id="transferNote" style="display: none; color: #d9534f; font-size: 14px; font-weight: bold; margin-bottom: 10px;">
            ☆☆☆送機時間請填寫司機到上車點的時間
        </div>
        <div class="form-group">
            <label>預約日期與時間</label>
            <input type="datetime-local" id="datetime" required>
        </div>
        <div class="form-group">
            <label>航班資訊</label>
            <input type="text" id="flight" placeholder="如：BR191" required>
        </div>
        <div class="form-group">
            <label>人數</label>
            <select id="passengers" onchange="checkVehicle()">
                <script>for(let i=1;i<=8;i++) document.write(`<option value="${i}">${i}人</option>`);</script>
            </select>
        </div>
        <div class="form-group">
            <label>車種</label>
            <select id="vehicle">
                <option value="轎車">轎車 (限4人)</option>
                <option value="休旅車">休旅車 (限4人)</option>
                <option value="7人座以上">7人座以上</option>
            </select>
        </div>
        <div class="form-group">
            <label>行李數量/大小</label>
            <input type="text" id="luggage" placeholder="例如：28吋*2 (無則填無)">
        </div>
        <!-- 初始狀態設為 disabled，等到 LIFF 好了才啟用 -->
        <button type="button" id="submitBtn" onclick="sendOrder()" disabled>載入中，請稍候...</button>
    </form>

    <script>
        // 1. 初始化 LIFF
        liff.init({ liffId: "2009263508-hAj1Qpgw" }).then(() => {
            console.log("LIFF Init Success");
            const btn = document.getElementById('submitBtn');
            btn.disabled = false; // 啟用按鈕
            btn.innerText = "送出預約";

            if (!liff.isLoggedIn()) {
                liff.login();
            }
        }).catch((err) => {
            alert("LIFF 載入失敗，請確認網路或 LIFF ID：" + err);
        });

        function toggleNote() {
            const type = document.getElementById('type').value;
            document.getElementById('transferNote').style.display = (type === "送機") ? "block" : "none";
        }

        function checkVehicle() {
            const pCount = parseInt(document.getElementById('passengers').value);
            const vehicleSelect = document.getElementById('vehicle');
            if (pCount >= 5) {
                vehicleSelect.value = "7人座以上";
                vehicleSelect.options[0].disabled = true; 
                vehicleSelect.options[1].disabled = true; 
            } else {
                vehicleSelect.options[0].disabled = false;
                vehicleSelect.options[1].disabled = false;
            }
        }

        function sendOrder() {
            const rawDt = document.getElementById('datetime').value;
            if(!rawDt) return alert("請填寫預約時間");

            const msg = `【機場接送預約】\n服務：${document.getElementById('type').value}\n時間：${rawDt.replace('T', ' ')}\n航班：${document.getElementById('flight').value}\n人數：${document.getElementById('passengers').value}人\n車種：${document.getElementById('vehicle').value}\n行李：${document.getElementById('luggage').value}`;
            
            // 2. 檢查發送權限
            liff.sendMessages().then(() => {
                liff.closeWindow(); 
            }).catch((err) => {
                alert("發送失敗！請確認是否已在 LINE 授權視窗點選「接受」。\n錯誤訊息：" + err);
            });
        }
    </script>
</body>
</html>
