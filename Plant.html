<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>機場接送預約</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 20px; background-color: #f8f9fa; color: #333; }
        h3 { text-align: center; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        select, input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; background-color: #00b900; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        #transferNote { display: none; color: #d9534f; font-size: 13px; font-weight: bold; margin-bottom: 10px; padding: 10px; background: #fff5f5; border: 1px solid #ffdada; border-radius: 6px; }
    </style>
</head>
<body>
    <h3>🚖 機場接送預約單</h3>
    <form id="bookingForm">
        <div class="form-group">
            <label>預約類別</label>
            <select id="type" onchange="toggleNote()">
                <option value="接機">接機 (機場 → 市區)</option>
                <option value="送機">送機 (市區 → 機場)</option>
            </select>
        </div>
        <div id="transferNote">⚠️ 提醒：送機時間請填寫「司機到上車點」的時間</div>
        <div class="form-group">
            <label>日期與時間</label>
            <input type="datetime-local" id="datetime" required>
        </div>
        <div class="form-group">
            <label>航班資訊</label>
            <input type="text" id="flight" placeholder="例如：BR191" required>
        </div>
        <div class="form-group">
            <label>人數</label>
            <select id="passengers" onchange="checkVehicle()">
                <script>for(let i=1; i<=8; i++) { document.write(`<option value="${i}">${i}人</option>`); }</script>
            </select>
        </div>
        <div class="form-group">
            <label>建議車種</label>
            <select id="vehicle">
                <option value="轎車">轎車 (限4人)</option>
                <option value="休旅車">休旅車 (限4人)</option>
                <option value="7人座以上">7人座以上</option>
            </select>
        </div>
        <div class="form-group">
            <label>行李數量/大小</label>
            <input type="text" id="luggage" placeholder="例如：28吋*2, 20吋*1" required>
        </div>
        <button type="button" id="submitBtn" onclick="sendOrder()" disabled>正在啟動 LINE...</button>
    </form>

    <script>
        const LIFF_ID = "2009263508-hAj1Qpgw"; 

        // 偵錯輔助：如果 5 秒後還沒啟動，彈出視窗
        const debugTimer = setTimeout(() => {
            if (document.getElementById('submitBtn').disabled) {
                alert("❌ SDK 載入超時！請嘗試點擊右上角「...」並選擇「重新整理」");
            }
        }, 5000);

        async function init() {
            try {
                // 確保 liff 變數存在
                if (typeof liff === 'undefined') {
                    throw new Error("找不到 liff 變數，請確認 SDK 載入路徑");
                }
                
                await liff.init({ liffId: LIFF_ID });
                clearTimeout(debugTimer);

                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    const btn = document.getElementById('submitBtn');
                    btn.disabled = false;
                    btn.innerText = "確認送出預約";
                }
            } catch (err) {
                alert("❌ LIFF 啟動失敗：" + err.message);
            }
        }

        // 網頁載入後執行
        window.onload = init;

        function toggleNote() {
            const type = document.getElementById('type').value;
            document.getElementById('transferNote').style.display = (type === "送機") ? "block" : "none";
        }

        function checkVehicle() {
            const pCount = parseInt(document.getElementById('passengers').value);
            const vehicleSelect = document.getElementById('vehicle');
            if (pCount >= 5) {
                vehicleSelect.value = "7人座以上";
                vehicleSelect.options[0].disabled = true;
                vehicleSelect.options[1].disabled = true;
            } else {
                vehicleSelect.options[0].disabled = false;
                vehicleSelect.options[1].disabled = false;
            }
        }

        async function sendOrder() {
    const type = document.getElementById('type').value;
    const rawDt = document.getElementById('datetime').value;
    const flight = document.getElementById('flight').value;
    const passengers = document.getElementById('passengers').value;
    const vehicle = document.getElementById('vehicle').value;
    const luggage = document.getElementById('luggage').value;

    if(!rawDt || !flight || !luggage) return alert("請填寫完整預約資訊");

    const msgText = `【機場接送預約】\n` +
                  `服務：${type}\n` +
                  `時間：${rawDt.replace('T', ' ')}\n` +
                  `航班：${flight}\n` +
                  `人數：${passengers}人\n` +
                  `車種：${vehicle}\n` +
                  `行李：${luggage}`;

    try {
        // 核心修正處
        await liff.sendMessages();
        liff.closeWindow();
    } catch (err) {
        alert("發送失敗：" + err.message + "\n請確認是否已授權「傳送訊息」權限。");
    }
}
    </script>
</body>
</html>
