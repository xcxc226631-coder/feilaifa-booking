<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>機場接送預約</title>
    <!-- 修正 1：正確的 LIFF SDK 引用地址 -->
    <script src="https://static.line-scdn.net"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; background-color: #f8f9fa; color: #333; }
        h3 { text-align: center; color: #111; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        select, input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; -webkit-appearance: none; }
        button { width: 100%; padding: 15px; background-color: #00b900; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        #transferNote { display: none; color: #d9534f; font-size: 13px; font-weight: bold; margin-bottom: 15px; padding: 10px; background: #fff5f5; border: 1px solid #ffdada; border-radius: 6px; }
    </style>
</head>
<body>
    <h3>🚖 機場接送預約單</h3>
    <form id="bookingForm">
        <div class="form-group">
            <label>預約類別</label>
            <select id="type" onchange="toggleNote()">
                <option value="接機">接機 (機場 → 市區)</option>
                <option value="送機">送機 (市區 → 機場)</option>
            </select>
        </div>
        
        <div id="transferNote">⚠️ 提醒：送機時間請填寫「司機到上車點」的時間</div>
        
        <div class="form-group">
            <label>日期與時間</label>
            <input type="datetime-local" id="datetime" required>
        </div>
        
        <div class="form-group">
            <label>航班資訊</label>
            <input type="text" id="flight" placeholder="例如：BR191" required>
        </div>
        
        <div class="form-group">
            <label>人數</label>
            <select id="passengers" onchange="checkVehicle()">
                <script>
                    for(let i=1; i<=8; i++) {
                        document.write(`<option value="${i}">${i}人</option>`);
                    }
                </script>
            </select>
        </div>
        
        <div class="form-group">
            <label>建議車種</label>
            <select id="vehicle">
                <option value="轎車">轎車 (限4人)</option>
                <option value="休旅車">休旅車 (限4人)</option>
                <option value="7人座以上">7人座以上 (大車)</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>行李數量/大小</label>
            <input type="text" id="luggage" placeholder="例如：28吋*2, 20吋*1" required>
        </div>
        
        <button type="button" id="submitBtn" onclick="sendOrder()" disabled>正在啟動 LINE...</button>
    </form>

    <script>
        // 記得檢查此 ID 是否與 LINE Developers 上的 LIFF ID 一致
        const LIFF_ID = "2009263508-hAj1Qpgw"; 

        async function initLIFF() {
            try {
                await liff.init({ liffId: LIFF_ID });
                const btn = document.getElementById('submitBtn');
                btn.disabled = false;
                btn.innerText = "確認送出預約";

                if (!liff.isLoggedIn()) {
                    liff.login();
                }
            } catch (err) {
                alert("❌ LIFF 初始化失敗，請於 LINE 內開啟\n錯誤：" + err.message);
            }
        }

        initLIFF();

        function toggleNote() {
            const type = document.getElementById('type').value;
            document.getElementById('transferNote').style.display = (type === "送機") ? "block" : "none";
        }

        function checkVehicle() {
            const pCount = parseInt(document.getElementById('passengers').value);
            const vehicleSelect = document.getElementById('vehicle');
            
            if (pCount >= 5) {
                vehicleSelect.value = "7人座以上";
                vehicleSelect.options[0].disabled = true;
                vehicleSelect.options[1].disabled = true;
            } else {
                vehicleSelect.options[0].disabled = false;
                vehicleSelect.options[1].disabled = false;
            }
        }

        async function sendOrder() {
            const rawDt = document.getElementById('datetime').value;
            const flight = document.getElementById('flight').value;
            const luggage = document.getElementById('luggage').value;

            if(!rawDt || !flight || !luggage) {
                return alert("請填寫完整資訊");
            }

            // 組裝訊息字串
            const msgText = `【機場接送預約】\n` +
                          `服務：${document.getElementById('type').value}\n` +
                          `時間：${rawDt.replace('T', ' ')}\n` +
                          `航班：${flight}\n` +
                          `人數：${document.getElementById('passengers').value}人\n` +
                          `車種：${document.getElementById('vehicle').value}\n` +
                          `行李：${luggage}`;

            try {
                // 修正 2：帶入正確的訊息格式（必須是陣列中的物件）
                await liff.sendMessages([
                    {
                        type: 'text',
                        text: msgText
                    }
                ]);
                liff.closeWindow(); // 傳送完成後自動關閉視窗
            } catch (err) {
                alert("傳送失敗！這可能是因為您在外部瀏覽器開啟，或拒絕了訊息權限。");
                console.error(err);
            }
        }
    </script>
</body>
</html>
