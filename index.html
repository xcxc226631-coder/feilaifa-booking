<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>飛來發車隊-快速叫車</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        /* 1. 基礎設定：全黑漸層背景 */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
            color: #D4AF37; /* 金色文字 */
            min-height: 100vh;
        }

        /* 2. 容器：防止內容撐破螢幕 */
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 25px 20px;
            box-sizing: border-box;
        }

        /* 3. 標題：奢華裝飾 */
        h2 { 
            text-align: center; 
            color: #D4AF37; 
            margin-bottom: 30px; 
            letter-spacing: 3px; 
            font-weight: 300;
            text-shadow: 0 2px 10px rgba(212, 175, 55, 0.2);
        }

        .form-group { margin-bottom: 22px; }
        
        /* 4. 標籤與提示 */
        label { 
            display: block; 
            margin-bottom: 10px; 
            font-weight: bold; 
            font-size: 14px; 
            color: #C0C0C0; /* 銀灰色標籤 */
        }
        .time-hint { font-size: 12px; color: #D4AF37; margin-bottom: 8px; opacity: 0.8; }

        /* 5. 奢華按鈕組 (選項) */
        .role-options, .time-options { display: flex; gap: 10px; margin-bottom: 12px; }
        .role-btn, .time-btn { 
            flex: 1; 
            padding: 14px 5px; 
            border: 1px solid #333; 
            border-radius: 6px; 
            background: rgba(255, 255, 255, 0.05); 
            color: #888; 
            text-align: center; 
            cursor: pointer; 
            font-size: 15px;
            transition: all 0.3s ease; 
        }
        
        /* 選中狀態：金邊發光 */
        .role-btn.active, .time-btn.active { 
            border-color: #D4AF37; 
            background-color: rgba(212, 175, 55, 0.1); 
            color: #D4AF37; 
            box-shadow: 0 0 12px rgba(212, 175, 55, 0.2);
        }

        /* 6. 輸入框：深色底與金線 */
        input, input[type="datetime-local"], select, textarea { 
            width: 100%; 
            padding: 14px; 
            border: 1px solid #222; 
            border-radius: 6px; 
            background-color: #0a0a0a; 
            color: #ffffff; 
            font-size: 16px; 
            box-sizing: border-box;
            appearance: none; /* 去除原生陰影 */
        }
        input:focus, select:focus { border-color: #D4AF37; outline: none; }

        /* 7. 需求選項區 (複選) */
        .checkbox-group { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
            background: #0a0a0a; 
            padding: 15px; 
            border-radius: 8px; 
            border: 1px solid #222; 
        }
        .checkbox-item { display: flex; align-items: center; color: #ccc; font-size: 14px; cursor: pointer; }
        .checkbox-item input { margin-right: 10px; accent-color: #D4AF37; width: 18px; height: 18px; }

        /* 8. 確認送出按鈕：金屬漸層 */
        .btn { 
            background: linear-gradient(135deg, #D4AF37 0%, #B8860B 100%); 
            color: #000; 
            border: none; 
            padding: 18px; 
            border-radius: 8px; 
            width: 100%; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 30px; 
            letter-spacing: 5px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6);
        }

        /* 隱藏區塊與馬偕專區 */
        #timeInputSection, .other-input, #mackayZone { display: none; margin-top: 10px; }
        .mackay-box { background: rgba(212, 175, 55, 0.05); padding: 15px; border-radius: 8px; border: 1px solid #333; }
        #normalZone { display: block; }
    </style>
</head>
<body>

<div class="container">
    <h2>⚜️ 飛來發預約單 ⚜️</h2>

    <div class="form-group">
        <label>👤 乘客身份</label>
        <div class="role-options">
            <div id="roleNormal" class="role-btn active" onclick="selectRole('normal')">一般乘客</div>
            <div id="roleMackay" class="role-btn" onclick="selectRole('mackay')">馬偕學生</div>
        </div>
    </div>

    <div class="form-group">
        <label>🕒 用車時間</label>
        <div class="time-options">
            <div id="btnNow" class="time-btn active" onclick="selectTimeType('now')">現在（即時）</div>
            <div id="btnBooking" class="time-btn" onclick="selectTimeType('booking')">預約叫車</div>
        </div>
        <div id="timeInputSection">
            <div class="time-hint">📅 請選取預約時間</div>
            <input type="datetime-local" id="time">
        </div>
    </div>

    <div id="normalZone">
        <div class="form-group">
            <label>📍 上車地點</label>
            <input type="text" id="pickup" placeholder="請輸入地址或地標">
        </div>
        <div class="form-group">
            <label>🏁 下車地點</label>
            <input type="text" id="dropoff" placeholder="請輸入目的地">
        </div>
    </div>

    <div id="mackayZone" class="mackay-box">
        <div class="form-group">
            <label>📍 上車點</label>
            <select id="mPickup" onchange="checkOther('mPickup', 'mPickupOther')">
                <option value="舊棟">舊棟</option>
                <option value="新棟">新棟</option>
                <option value="校門">校門</option>
                <option value="淡水捷運站">淡水捷運站</option>
                <option value="紅樹林站">紅樹林站</option>
                <option value="大都會廣場">大都會廣場</option>
                <option value="其他">其他 (自行輸入)</option>
            </select>
            <input type="text" id="mPickupOther" class="other-input" placeholder="請輸入上車位置">
        </div>
        <div class="form-group">
            <label>🏁 下車點</label>
            <select id="mDropoff" onchange="checkOther('mDropoff', 'mDropoffOther')">
                <option value="舊棟">舊棟</option>
                <option value="新棟">新棟</option>
                <option value="校門">校門</option>
                <option value="淡水捷運站">淡水捷運站</option>
                <option value="紅樹林站">紅樹林站</option>
                <option value="大都會廣場">大都會廣場</option>
                <option value="其他">其他 (自行輸入)</option>
            </select>
            <input type="text" id="mDropoffOther" class="other-input" placeholder="請輸入下車位置">
        </div>
    </div>

    <div class="form-group">
        <label>👥 乘車人數</label>
        <select id="passengers">
            <option value="1人">1人</option>
            <option value="2人">2人</option>
            <option value="3人">3人</option>
            <option value="4人">4人</option>
            <option id="optMore" value="5人以上">5人以上 (請於備註說明)</option>
        </select>
    </div>

    <div class="form-group">
        <label>🛠️ 需求選項 (可複選)</label>
        <div class="checkbox-group">
            <label class="checkbox-item"><input type="checkbox" name="prefs" value="禁菸車">禁菸車</label>
            <label class="checkbox-item"><input type="checkbox" name="prefs" value="不想聊天">不想聊天</label>
            <label class="checkbox-item"><input type="checkbox" name="prefs" value="不放音樂">不放音樂</label>
            <label class="checkbox-item"><input type="checkbox" name="prefs" value="想抽電子菸">想抽電子菸</label>
            <label class="checkbox-item"><input type="checkbox" name="prefs" value="想抽紙菸">想抽紙菸</label>
            <label class="checkbox-item"><input type="checkbox" name="prefs" value="想抽加熱菸">想抽加熱菸</label>
        </div>
    </div>

    <div class="form-group">
        <label>📝 其他備註 (如：行李箱大小)</label>
        <textarea id="note" rows="2" placeholder="如有其他特殊需求請註明"></textarea>
    </div>

    <button class="btn" id="submitBtn">確認送出預約</button>
</div>

<script>
    let selectedRole = 'normal';
    let selectedTime = 'now';

    async function main() {
        await liff.init({ liffId: "2009263508-NTuggdp5" });
    }

    function selectRole(role) {
        selectedRole = role;
        document.getElementById('roleNormal').classList.toggle('active', role === 'normal');
        document.getElementById('roleMackay').classList.toggle('active', role === 'mackay');
        
        const isMackay = (role === 'mackay');
        document.getElementById('mackayZone').style.display = isMackay ? 'block' : 'none';
        document.getElementById('normalZone').style.display = isMackay ? 'none' : 'block';

        const passSelect = document.getElementById('passengers');
        const optMore = document.getElementById('optMore');
        if (isMackay) {
            optMore.disabled = true;
            if (passSelect.value === "5人以上") passSelect.value = "1人";
        } else {
            optMore.disabled = false;
        }
    }

    function selectTimeType(type) {
        selectedTime = type;
        document.getElementById('btnNow').classList.toggle('active', type === 'now');
        document.getElementById('btnBooking').classList.toggle('active', type === 'booking');
        document.getElementById('timeInputSection').style.display = (type === 'booking') ? 'block' : 'none';
    }

    function checkOther(selectId, inputId) {
        const val = document.getElementById(selectId).value;
        document.getElementById(inputId).style.display = (val === '其他') ? 'block' : 'none';
    }

    document.getElementById('submitBtn').addEventListener('click', async () => {
        let pickup, dropoff;
        const isMackay = (selectedRole === 'mackay');

        if (isMackay) {
            const p = document.getElementById('mPickup').value;
            pickup = (p === '其他') ? document.getElementById('mPickupOther').value : p;
            const d = document.getElementById('mDropoff').value;
            dropoff = (d === '其他') ? document.getElementById('mDropoffOther').value : d;
        } else {
            pickup = document.getElementById('pickup').value;
            dropoff = document.getElementById('dropoff').value;
        }

        const timeStr = (selectedTime === 'now') ? "現在(即時)" : document.getElementById('time').value.replace('T', ' ');
        const psng = document.getElementById('passengers').value;
        
        const checkboxes = document.querySelectorAll('input[name="prefs"]:checked');
        let selectedPrefs = Array.from(checkboxes).map(cb => cb.value).join('、');
        const noteInput = document.getElementById('note').value;
        let finalNote = (selectedPrefs && noteInput) ? `${selectedPrefs} | ${noteInput}` : (selectedPrefs || noteInput || "無");

        const roleTag = isMackay ? "【馬偕學生】" : "【一般叫車】";

        if (!pickup || !dropoff || (selectedTime === 'booking' && !document.getElementById('time').value)) {
            alert("請完整填寫地點與時間");
            return;
        }

        const msg = `⚜️ 飛來發預約單 ⚜️\n類型：${roleTag}\n時間：${timeStr}\n上車：${pickup}\n下車：${dropoff}\n人數：${psng}\n備註：${finalNote}`;

        try {
            await liff.sendMessages();
            liff.closeWindow();
        } catch (err) {
            alert("傳送失敗：" + err.message);
        }
    });

    main();
</script>
</body>
</html>
