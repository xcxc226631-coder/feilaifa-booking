<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飛來發車隊-馬偕預約系統</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 20px; background-color: #f8f9fa; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px; }
        input[type="text"], input[type="datetime-local"], select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .time-options { display: flex; gap: 10px; margin-bottom: 10px; }
        .time-btn { flex: 1; padding: 10px; border: 2px solid #ddd; border-radius: 8px; background: white; text-align: center; cursor: pointer; font-weight: bold; }
        .time-btn.active { border-color: #d32f2f; background-color: #fff5f5; color: #d32f2f; }
        .checkbox-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #fff; padding: 12px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 10px; }
        .checkbox-item { display: flex; align-items: center; font-weight: normal; font-size: 14px; cursor: pointer; }
        .btn { background-color: #d32f2f; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        h2 { text-align: center; color: #d32f2f; margin-bottom: 20px; }
        .special-zone { background: #fff3f3; padding: 15px; border-radius: 10px; border: 1px dashed #d32f2f; margin-bottom: 15px; }
        #timeInputSection, .other-input { display: none; margin-top: 10px; }
    </style>
</head>
<body>

    <h2>🀄️ 飛來發預約單 🀄️</h2>

    <div class="special-zone">
        <label style="color: #d32f2f;">⭐ 乘客類別</label>
        <select id="userRole" onchange="toggleZone()">
            <option value="一般乘客">一般乘客</option>
            <option value="馬偕學生">🎓 馬偕學生專區 (自動標記)</option>
        </select>
    </div>

    <div class="form-group">
        <label>用車時間</label>
        <div class="time-options">
            <div id="btnNow" class="time-btn active" onclick="selectTimeType('now')">現在（即時）</div>
            <div id="btnBooking" class="time-btn" onclick="selectTimeType('booking')">預約叫車</div>
        </div>
        <div id="timeInputSection">
            <input type="datetime-local" id="time">
        </div>
    </div>

    <!-- 一般地點輸入 -->
    <div id="normalZone">
        <div class="form-group">
            <label>上車地點</label>
            <input type="text" id="pickup" placeholder="請輸入地址或地標">
        </div>
        <div class="form-group">
            <label>下車地點</label>
            <input type="text" id="dropoff" placeholder="請輸入目的地">
        </div>
    </div>

    <!-- 馬偕專用地點 -->
    <div id="mackayZone" style="display:none;">
        <div class="form-group">
            <label>📍 馬偕上車點</label>
            <select id="mPickup" onchange="checkOther('mPickup', 'mPickupOther')">
                <option value="舊棟">舊棟</option>
                <option value="新棟">新棟</option>
                <option value="校門">校門</option>
                <option value="淡水捷運站">淡水捷運站</option>
                <option value="紅樹林站">紅樹林站</option>
                <option value="大都會廣場">大都會廣場</option>
                <option value="其他">其他 (自行輸入)</option>
            </select>
            <input type="text" id="mPickupOther" class="other-input" placeholder="請輸入上車位置">
        </div>
        <div class="form-group">
            <label>🏁 馬偕下車點</label>
            <select id="mDropoff" onchange="checkOther('mDropoff', 'mDropoffOther')">
                <option value="舊棟">舊棟</option>
                <option value="新棟">新棟</option>
                <option value="校門">校門</option>
                <option value="淡水捷運站">淡水捷運站</option>
                <option value="紅樹林站">紅樹林站</option>
                <option value="大都會廣場">大都會廣場</option>
                <option value="其他">其他 (自行輸入)</option>
            </select>
            <input type="text" id="mDropoffOther" class="other-input" placeholder="請輸入下車位置">
        </div>
    </div>

    <div class="form-group">
        <label>乘車人數</label>
        <select id="passengers">
            <option value="1人">1人</option>
            <option value="2人">2人</option>
            <option value="3人">3人</option>
            <option value="4人">4人</option>
            <option value="5人以上">5人以上</option>
        </select>
    </div>

    <div class="form-group">
        <label>備註需求</label>
        <textarea id="note" rows="2" placeholder="行李箱大小或特殊需求"></textarea>
    </div>

    <button class="btn" id="submitBtn">確認送出預約</button>

    <script>
        let selectedType = 'now';

        async function main() {
            await liff.init({ liffId: "2009263508-NTuggdp5" });
        }

        function toggleZone() {
            const isMackay = document.getElementById('userRole').value === '馬偕學生';
            document.getElementById('mackayZone').style.display = isMackay ? 'block' : 'none';
            document.getElementById('normalZone').style.display = isMackay ? 'none' : 'block';
        }

        function checkOther(selectId, inputId) {
            const val = document.getElementById(selectId).value;
            document.getElementById(inputId).style.display = (val === '其他') ? 'block' : 'none';
        }

        function selectTimeType(type) {
            selectedType = type;
            document.getElementById('btnNow').classList.toggle('active', type === 'now');
            document.getElementById('btnBooking').classList.toggle('active', type === 'booking');
            document.getElementById('timeInputSection').style.display = (type === 'booking') ? 'block' : 'none';
        }

        document.getElementById('submitBtn').addEventListener('click', async () => {
            const isMackay = document.getElementById('userRole').value === '馬偕學生';
            let pickup, dropoff;

            if (isMackay) {
                const p = document.getElementById('mPickup').value;
                pickup = (p === '其他') ? document.getElementById('mPickupOther').value : p;
                const d = document.getElementById('mDropoff').value;
                dropoff = (d === '其他') ? document.getElementById('mDropoffOther').value : d;
            } else {
                pickup = document.getElementById('pickup').value;
                dropoff = document.getElementById('dropoff').value;
            }

            const time = (selectedType === 'now') ? "現在(即時)" : document.getElementById('time').value.replace('T', ' ');
            const psng = document.getElementById('passengers').value;
            const note = document.getElementById('note').value || "無";
            const roleTag = isMackay ? "【馬偕專區】" : "【一般叫車】";

            if (!pickup || !dropoff || (selectedType === 'booking' && !document.getElementById('time').value)) {
                alert("請完整填寫地點與時間");
                return;
            }

            const msg = `${roleTag}\n時間：${time}\n上車：${pickup}\n下車：${dropoff}\n人數：${psng}\n備註：${note}`;

            try {
                await liff.sendMessages([{ type: 'text', text: msg }]);
                liff.closeWindow();
            } catch (err) {
                alert("傳送失敗：" + err.message);
            }
        });

        main();
    </script>
</body>
</html>
