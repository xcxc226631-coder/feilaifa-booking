<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飛來發線上預約</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 20px; background-color: #f8f9fa; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px; }
        input[type="text"], input[type="datetime-local"], select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .time-options { display: flex; gap: 10px; margin-bottom: 10px; }
        .time-btn { flex: 1; padding: 10px; border: 2px solid #ddd; border-radius: 8px; background: white; text-align: center; cursor: pointer; font-weight: bold; }
        .time-btn.active { border-color: #00b900; background-color: #e6f7e6; color: #00b900; }
        .checkbox-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #fff; padding: 12px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 10px; }
        .checkbox-item { display: flex; align-items: center; font-weight: normal; font-size: 14px; cursor: pointer; }
        .checkbox-item input { margin-right: 8px; width: 18px; height: 18px; }
        .btn { background-color: #00b900; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn:active { background-color: #009000; }
        h2 { text-align: center; color: #d32f2f; margin-bottom: 20px; }
        #timeInputSection { display: none; margin-top: 10px; }
    </style>
</head>
<body>

    <h2>🀄️ 飛來發預約單 🀄️</h2>

    <div class="form-group">
        <label>用車時間</label>
        <div class="time-options">
            <div id="btnNow" class="time-btn active" onclick="selectTimeType('now')">現在（即時）</div>
            <div id="btnBooking" class="time-btn" onclick="selectTimeType('booking')">預約叫車專區</div>
        </div>
        <div id="timeInputSection">
            <label style="font-size: 12px; color: #666;">請選取預約日期與時間：</label>
            <input type="datetime-local" id="time">
        </div>
    </div>

    <div class="form-group">
        <label>上車地點</label>
        <input type="text" id="pickup" placeholder="請輸入地址或地標">
    </div>

    <div class="form-group">
        <label>下車地點</label>
        <input type="text" id="dropoff" placeholder="請輸入目的地">
    </div>

    <div class="form-group">
        <label>乘車人數</label>
        <select id="passengers">
            <option value="1人">1人</option>
            <option value="2人">2人</option>
            <option value="3人">3人</option>
            <option value="4人">4人</option>
            <option value="5人以上">5人以上 (請於備註說明)</option>
        </select>
    </div>

    <div class="form-group">
        <label>需求選項 (可複選)</label>
        <div class="checkbox-group">
            <label class="checkbox-item"><input type="checkbox" name="prefs" value="禁菸車">禁菸車</label>
            <label class="checkbox-item"><input type="checkbox" name="prefs" value="不想聊天">不想聊天</label>
            <label class="checkbox-item"><input type="checkbox" name="prefs" value="不放音樂">不放音樂</label>
            <label class="checkbox-item"><input type="checkbox" name="prefs" value="想抽電子菸">想抽電子菸</label>
            <label class="checkbox-item"><input type="checkbox" name="prefs" value="想抽紙菸">想抽紙菸</label>
            <label class="checkbox-item"><input type="checkbox" name="prefs" value="想抽加熱菸">想抽加熱菸</label>
        </div>
        <label>其他備註 (如：行李箱大小)</label>
        <textarea id="note" rows="2" placeholder="如有其他特殊需求請註明"></textarea>
    </div>

    <button class="btn" id="submitBtn">確認送出預約</button>

    <script>
        let selectedType = 'now';

        function selectTimeType(type) {
            selectedType = type;
            const btnNow = document.getElementById('btnNow');
            const btnBooking = document.getElementById('btnBooking');
            const timeSection = document.getElementById('timeInputSection');

            if (type === 'now') {
                btnNow.classList.add('active');
                btnBooking.classList.remove('active');
                timeSection.style.display = 'none';
            } else {
                btnNow.classList.remove('active');
                btnBooking.classList.add('active');
                timeSection.style.display = 'block';
            }
        }

        async function main() {
            await liff.init({ liffId: "2009263508-NTuggdp5" });

            document.getElementById('submitBtn').addEventListener('click', async () => {
                const timeValue = document.getElementById('time').value;
                const pickup = document.getElementById('pickup').value;
                const dropoff = document.getElementById('dropoff').value;
                const passengers = document.getElementById('passengers').value;
                
                // 處理勾選項目
                const checkboxes = document.querySelectorAll('input[name="prefs"]:checked');
                let selectedPrefs = Array.from(checkboxes).map(cb => cb.value).join('、');
                const noteInput = document.getElementById('note').value;

                // 整合備註文字
                let finalNote = "";
                if (selectedPrefs && noteInput) {
                    finalNote = `${selectedPrefs} | ${noteInput}`;
                } else {
                    finalNote = selectedPrefs || noteInput || "無";
                }

                let finalTime = (selectedType === 'now') ? "即時" : timeValue.replace('T', ' ');

                if (selectedType === 'booking' && !timeValue) {
                    alert("請選取預約叫車的時間");
                    return;
                }
                if (!pickup || !dropoff) {
                    alert("請填寫上車及下車地點");
                    return;
                }

                const msg = `🀄️飛來發預約單🀄️\n時間：${finalTime}\n上車：${pickup}\n下車：${dropoff}\n人數：${passengers}\n備註：${finalNote}`;

                try {
                    await liff.sendMessages([
                        { type: 'text', text: '我要叫車' },
                        { type: 'text', text: msg }
                    ]);
                    liff.closeWindow(); 
                } catch (err) {
                    alert("傳送失敗：" + err.message);
                }
            });
        }
        main();
    </script>
</body>
</html>
